<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LumenFlow Stage 0</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <canvas id="lumenflow" aria-label="LumenFlow generative particle visual"></canvas>

    <section id="help" class="panel" aria-live="polite">
      <h1>LumenFlow</h1>
      <p>Local particle-flow visual for ambient projection.</p>
      <dl>
        <div><dt>1</dt><dd>Calm / laminar</dd></div>
        <div><dt>2</dt><dd>Vortex</dd></div>
        <div><dt>3</dt><dd>Bright / neon</dd></div>
        <div><dt>Space</dt><dd>Cycle palette</dd></div>
        <div><dt>↑ / ↓</dt><dd>Particle count</dd></div>
        <div><dt>F</dt><dd>Fullscreen</dd></div>
        <div><dt>H</dt><dd>Hide help</dd></div>
        <div><dt>R</dt><dd>Reset particles</dd></div>
      </dl>
      <p id="status">Preset 1 · particles loading</p>
    </section>

    <script src="main.js"></script>
  </body>
</html>
